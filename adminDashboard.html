<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Dashboard</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{

            background:#03122e;

            min-height:100vh;

            color:white;
        }

        /* NAVBAR */

        .navbar{

            background:#233b92;

            padding:20px 35px;

            display:flex;

            justify-content:space-between;

            align-items:center;

            box-shadow:0 4px 15px rgba(0,0,0,0.4);
        }

        .logo{

            font-size:42px;

            font-weight:bold;

            color:#ffd633;
        }

        .logout-btn{

            background:#ff4d4d;

            color:white;

            border:none;

            padding:12px 26px;

            border-radius:12px;

            font-size:18px;

            font-weight:bold;

            cursor:pointer;

            transition:0.3s;
        }

        .logout-btn:hover{

            background:#e63939;

            transform:scale(1.04);
        }

        /* MAIN SECTION */

        .main{

            width:100%;

            min-height:85vh;

            display:flex;

            justify-content:center;

            align-items:center;

            padding:40px 20px;
        }

        /* CARD */

        .card{

            width:420px;

            background:#1b2a47;

            padding:50px 40px;

            border-radius:24px;

            text-align:center;

            box-shadow:0 10px 30px rgba(0,0,0,0.5);

            transition:0.3s;
        }

        .card:hover{

            transform:translateY(-8px);
        }

        /* ICON */

        .icon{

            font-size:80px;

            margin-bottom:25px;
        }

        /* TITLE */

        .card h1{

            font-size:42px;

            margin-bottom:20px;

            color:white;
        }

        /* TEXT */

        .card p{

            font-size:20px;

            color:#d8d8d8;

            line-height:32px;

            margin-bottom:35px;
        }

        /* BUTTON */

        .view-btn{

            width:100%;

            height:60px;

            border:none;

            border-radius:15px;

            background:#29cf5d;

            color:white;

            font-size:24px;

            font-weight:bold;

            cursor:pointer;

            transition:0.3s;
        }

        .view-btn:hover{

            background:#1fb34d;

            transform:scale(1.03);
        }

        /* RESPONSIVE */

        @media(max-width:600px){

            .logo{

                font-size:30px;
            }

            .card{

                width:100%;
            }

            .card h1{

                font-size:34px;
            }

        }

    </style>

</head>

<body>

    <!-- NAVBAR -->

    <div class="navbar">

        <div class="logo">

            Admin Dashboard

        </div>

<button
onclick="window.location.href='LogoutServlet'"
class="logout-btn"
>

    Logout

</button>

    </div>

    <!-- MAIN -->

    <div class="main">

        <div class="card">

            <div class="icon">

                📊

            </div>

            <h1>

                Transaction History

            </h1>

            <p>

                View all banking transactions, account activities and user records.

            </p>

            <button 
                class="view-btn"
                onclick="window.location.href='/banking-management-system/viewaccounts'"
            >

                View Details

            </button>

        </div>

    </div>

</body>

</html>
