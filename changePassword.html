<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Change Password</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{

            background:#03122e;

            display:flex;

            justify-content:center;

            align-items:center;

            min-height:100vh;

            padding:20px;
        }

        .container{

            width:500px;

            background:#1b2a47;

            padding:40px;

            border-radius:22px;

            box-shadow:0 8px 25px rgba(0,0,0,0.5);
        }

        h1{

            text-align:center;

            color:white;

            margin-bottom:35px;

            font-size:38px;
        }

        .form-group{

            display:flex;

            flex-direction:column;

            margin-bottom:25px;
        }

        label{

            color:white;

            margin-bottom:10px;

            font-size:22px;

            font-weight:bold;
        }

        input{

            width:100%;

            height:55px;

            padding:12px 15px;

            border:none;

            border-radius:12px;

            background:#071530;

            color:white;

            font-size:18px;

            outline:none;
        }

        input::placeholder{

            color:#cfcfcf;
        }

        .btn{

            width:100%;

            height:58px;

            border:none;

            border-radius:14px;

            background:#29cf5d;

            color:white;

            font-size:22px;

            font-weight:bold;

            cursor:pointer;

            transition:0.3s;
        }

        .btn:hover{

            background:#1fb34d;

            transform:scale(1.02);
        }

        .back-btn{

            display:block;

            text-align:center;

            margin-top:20px;

            color:#29cf5d;

            text-decoration:none;

            font-size:18px;

            font-weight:bold;
        }

        .back-btn:hover{

            text-decoration:underline;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Change Password</h1>

        <form action="changepassword" method="post">

            <!-- USERNAME -->

            <div class="form-group">

                <label>Username</label>

                <input 
                    type="text"
                    name="username"
                    placeholder="Enter username"
                    required
                >

            </div>

            <!-- OLD PASSWORD -->

            <div class="form-group">

                <label>Old Password</label>

                <input 
                    type="password"
                    name="oldpassword"
                    placeholder="Enter old password"
                    required
                >

            </div>

            <!-- NEW PASSWORD -->

            <div class="form-group">

                <label>New Password</label>

                <input 
                    type="password"
                    name="newpassword"
                    placeholder="Enter new password"
                    required
                >

            </div>

            <!-- BUTTON -->

            <button class="btn">

                Change Password

            </button>

        </form>

        <!-- BACK -->

        <a href="userDashboard.html" class="back-btn">

            ← Back To Dashboard

        </a>

    </div>

</body>

</html>
