<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create Account</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{

            background:#03122e;

            display:flex;

            justify-content:center;

            align-items:center;

            min-height:100vh;

            padding:30px;
        }

        .container{

            width:650px;

            background:#1b2a47;

            padding:35px;

            border-radius:22px;

            box-shadow:0 8px 25px rgba(0,0,0,0.5);
        }

        .container h1{

            text-align:center;

            color:white;

            margin-bottom:30px;

            font-size:42px;
        }

        .form-grid{

            display:grid;

            grid-template-columns:1fr 1fr;

            gap:22px;
        }

        .form-group{

            display:flex;

            flex-direction:column;
        }

        label{

            color:white;

            margin-bottom:8px;

            font-size:22px;

            font-weight:bold;
        }

        input,
        select{

            width:100%;

            height:55px;

            padding:12px 15px;

            border:none;

            border-radius:12px;

            background:#071530;

            color:white;

            font-size:18px;

            outline:none;
        }

        input::placeholder{
            color:#cfcfcf;
        }

        /* SELECT OPTIONS */

        select option{

            background:#071530;

            color:white;
        }

        /* FULL WIDTH */

        .full-width{

            grid-column:1 / 3;
        }

        /* BUTTON */

        .btn{

            width:100%;

            height:58px;

            margin-top:25px;

            border:none;

            border-radius:14px;

            background:#29cf5d;

            color:white;

            font-size:22px;

            font-weight:bold;

            cursor:pointer;

            transition:0.3s;
        }

        .btn:hover{

            background:#1fb34d;

            transform:scale(1.02);
        }

        /* RESPONSIVE */

        @media(max-width:750px){

            .container{
                width:100%;
            }

            .form-grid{
                grid-template-columns:1fr;
            }

            .full-width{
                grid-column:auto;
            }

        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Create New Account</h1>

        <form action="createaccount" method="post">

            <div class="form-grid">

                <!-- FULL NAME -->

                <div class="form-group">

                    <label>Full Name</label>
		

                    <input 
                        type="text"
                        placeholder="Enter full name"
			name="fullname"

                    >

                </div>

                <!-- AADHAR -->

                <div class="form-group">

                    <label>Aadhar Number</label>

                    <input 
                        type="text"
                        placeholder="Enter Aadhar number"
			name="aadhar"

                    >

                </div>

                <!-- MOBILE -->

                <div class="form-group">

                    <label>Mobile Number</label>

                    <input 
                        type="text"
                        placeholder="Enter mobile number"
			name="mobile"

                    >

                </div>

                <!-- EMAIL -->

                <div class="form-group">

                    <label>Email</label>

                    <input 
                        type="email"
                        placeholder="Enter email"
			name="email"

                    >

                </div>

                <!-- FATHER NAME -->

                <div class="form-group">

                    <label>Father Name</label>

                    <input 
                        type="text"
                        placeholder="Enter father name"
			name="fathername"


                    >

                </div>

                <!-- ACCOUNT TYPE -->

                <div class="form-group">

                    <label>Account Type</label>

                    <select name="accounttype">

                        <option>Select Type</option>

                        <option>Savings</option>

                        <option>Current</option>

                        <option>Salary</option>

                    </select>

                </div>

                <!-- BALANCE -->

                <div class="form-group">

                    <label>Balance</label>

                    <input 
                        type="text"
                        placeholder="Enter balance"
			name="balance"

                    >

                </div>

                <!-- GENDER -->

                <div class="form-group">

                    <label>Gender</label>

                    <select name="gender">

                        <option>Select Gender</option>

                        <option>Male</option>

                        <option>Female</option>

                        <option>Other</option>

                    </select>

                </div>

            </div>

            <!-- BUTTON -->

            <button class="btn">

                Create Account

            </button>

        </form>

    </div>

</body>

</html>
