<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#03122e;
    color:white;
}

/* NAVBAR */

.navbar{
    background:#233b92;
    padding:18px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 3px 12px rgba(0,0,0,0.4);
}

.logo{
    font-size:42px;
    font-weight:bold;
    color:#ffd633;
}

.logout-btn{
    background:#ff4d4d;
    color:white;
    border:none;
    padding:12px 26px;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
    font-weight:bold;
}

.logout-btn:hover{
    background:#e63939;
}

/* DASHBOARD */

.dashboard{
    width:95%;
    margin:45px auto;
    
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:35px;
}

/* CARD */

.card{
    background:#182845;
    border-radius:22px;
    padding:35px 25px;
    text-align:center;
    min-height:260px;

    display:flex;
    flex-direction:column;
    justify-content:space-between;

    transition:0.3s;
    box-shadow:0 6px 18px rgba(0,0,0,0.4);
}

.card:hover{
    transform:translateY(-8px);
}

/* ICON */

.icon{
    font-size:58px;
    margin-top:5px;
}

/* TITLE */

.card h2{
    font-size:28px;
    line-height:40px;
    margin:18px 0;
}

/* BUTTON */

.card button{
    background:#2dcf5a;
    color:white;
    border:none;
    border-radius:14px;
    padding:14px;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.card button:hover{
    background:#22b94d;
    transform:scale(1.03);
}

/* RESPONSIVE */

@media(max-width:1100px){

    .dashboard{
        grid-template-columns:repeat(2,1fr);
    }

}

@media(max-width:700px){

    .dashboard{
        grid-template-columns:1fr;
    }

    .logo{
        font-size:30px;
    }

}

</style>
</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

    <div class="logo">User Dashboard</div>

<button
onclick="window.location.href='LogoutServlet'"
class="logout-btn"
>

    Logout

</button>

</div>

<!-- DASHBOARD -->

<div class="dashboard">

    <!-- HOME -->

    <div class="card">
        <div class="icon">🏠</div>
        <h2>Home</h2>
        <button onclick="window.location.href='index.html'">Go To Home</button>
    </div>

    <!-- NEW ACCOUNT -->

    <div class="card">
        <div class="icon">🏦</div>
        <h2>New Account</h2>
        <button onclick="window.location.href='createAccount.html'">Create New Account</button>
    </div>

    <!-- TRANSFER -->

    <div class="card">
        <div class="icon">💸</div>
        <h2>Transfer</h2>
        <button onclick="window.location.href='transfer.html'">Transfer Money</button>
    </div>

    <!-- DEBIT -->

    <div class="card">
        <div class="icon">📤</div>
        <h2>Debit</h2>
        <button onclick="window.location.href='debit.html'">Debit Money</button>
    </div>

    <!-- CREDIT -->

    <div class="card">
        <div class="icon">📥</div>
        <h2>Credit</h2>
        <button onclick="window.location.href='credit.html'">Credit Money</button>
    </div>

    <!-- BALANCE -->

    <div class="card">
        <div class="icon">💰</div>
        <h2>Check Balance</h2>
        <button onclick="window.location.href='checkBalance.html'">Check Available Balance</button>
    </div>

    <!-- TRANSACTION -->

    <div class="card">
        <div class="icon">📜</div>
        <h2>Transaction History</h2>
        <button onclick="window.location.href='transactionHistory.html'">Show Transaction History</button>
    </div>

    <!-- PASSWORD -->

    <div class="card">
        <div class="icon">🔒</div>
        <h2>Change Password</h2>
        <button onclick="window.location.href='changePassword.html'">Change Password</button>
    </div>

</div>

</body>
</html>
