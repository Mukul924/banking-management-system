<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Banking System</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #1e3a8a, #0f172a);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 15px;
      width: 350px;
      backdrop-filter: blur(10px);
      color: white;
      text-align: center;
    }

    h2 {
      margin-bottom: 25px;
    }

    .input-group {
      margin-bottom: 15px;
      text-align: left;
    }

    label {
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: none;
      border-radius: 8px;
      outline: none;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: white;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }
    
	select {
	color: white;
	background: rgba(255,255,255,0.15);
	border: 1px solid rgba(255,255,255,0.3);
	padding: 6px;
	border-radius: 6px;
	}
	
	select option{
	 color: white;
	 background: #2c3e50;
	}
  

    .btn:hover {
      background: #16a34a;
    }

    .extra {
      margin-top: 15px;
      font-size: 14px;
    }

    .extra a {
      color: #facc15;
      text-decoration: none;
    }

  </style>
</head>
<body>

  <div class="container">
    <h2>Login</h2>

    <form action="login" method="post">

	<div class="input-group">
	<select name="role">
    <option value="user">User</option>
    <option value="admin">Admin</option>
  	</select>
 	</div>

      <div class="input-group">
        <label>Email / Username</label>
        <input type="text" name="email" placeholder="Enter your email">
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter your password">
      </div>

      <button class="btn">Login</button>
    </form>

    <div class="extra">
      <p>Don't have an account? <a href="register.html">Register</a></p>
    </div>

  </div>

</body>
</html>
